{% if uploads %}
    <h2>Arquivos enviados:</h2>
    {% for upload in uploads %}
        {% if from_page == "index" %}
        <form method="post" action="/filetable">
            <input type="hidden" name="file_id" value="{{ upload.id }}">
            <button class="file-box" type="submit">{{ upload.filename }}</button>
        </form>

        <form method="post" action="/delete_file" onsubmit="return confirm('Do you want to delete this file?');">
                <input type="hidden" name="filename" value="{{ upload.filename }}">
                <button type="submit">🗑️</button>
        </form>

        {% elif from_page == "dashboard" %}
        <form method="post" action="/dashboard">
            <input type="hidden" name="file_id" value="{{ upload.id }}">
            <button class="file-box" type="submit">{{ upload.filename }}</button>
        </form>
                  
        {% endif %}
    {% endfor %}
{% endif %}
